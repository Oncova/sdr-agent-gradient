# OpenClaw Agent Specification — 3-Agent SDR Architecture
# Deployed as isolated workspaces on a single DigitalOcean App Platform deployment
# Runtime: OpenClaw SDK | Model: openai-gpt-5.4

version: "1.0"
platform: digitalocean-app-platform
project: sdr-agent-gradient

agents:
  # ─────────────────────────────────────────────────────
  #  Agent 1: Lead Scraping & Enrichment Specialist
  # ─────────────────────────────────────────────────────
  - name: sdr-scraper
    model: openai-gpt-5.4
    system_prompt: >
      You are a lead scraping and enrichment specialist.
      Use the Playwright and Apollo/PDL tools to scrape solo
      PI and Criminal Defense attorneys from the Florida Bar
      directory and enrich each lead with email and mobile number.
    tools:
      - playwright_mcp
      - enrichment_mcp
      - redis_mcp
      - brightdata_mcp
      - onetrust_mcp
    resources:
      cpu: 2
      memory: 4Gi
    scaling:
      min_instances: 1
      max_instances: 3

  # ─────────────────────────────────────────────────────
  #  Agent 2: SDR Pitch Generator
  # ─────────────────────────────────────────────────────
  - name: sdr-pitcher
    model: openai-gpt-5.4
    system_prompt: >
      You are an elite Sales Development Representative for an AI voice
      receptionist agency. Your objective is to pitch a $99/week trial
      for an ElevenLabs-powered AI voice receptionist specifically to
      solo Personal Injury and Criminal Defense attorneys in South Florida.

      Strict Execution Constraints:
      1. The email body must be strictly under 100 words.
      2. Highly personalize the message to the attorney's specific firm name and practice area.
      3. End the email with a soft call-to-action asking if they are open to hearing a quick audio sample of the AI handling a mock intake call.
      4. Output your response strictly as a JSON object containing exactly two keys: 'subject' and 'pitch_body'.
      5. Do not include markdown formatting, code blocks, conversational filler, or any text outside the JSON.
    tools:
      - mailreach_mcp
      - dmarc_mcp
      - workspace_mcp
      - elevenlabs_mcp
      - lemon_squeezy_mcp
    resources:
      cpu: 2
      memory: 4Gi
    scaling:
      min_instances: 1
      max_instances: 5

  # ─────────────────────────────────────────────────────
  #  Agent 3: Follow-Up & Closing Specialist
  # ─────────────────────────────────────────────────────
  - name: sdr-closer
    model: openai-gpt-5.4
    system_prompt: >
      You are a follow-up and closing specialist. Monitor reply
      sentiment from attorneys, route warm responses to Vapi for
      a live call demo, and trigger the Lemon Squeezy $99/week
      checkout link when an attorney says yes.
    tools:
      - telephony_mcp
      - temporal_mcp
      - pandadoc_mcp
      - n8n_mcp
      - lemon_squeezy_mcp
    resources:
      cpu: 2
      memory: 4Gi
    scaling:
      min_instances: 1
      max_instances: 3

# ───────────────────────────────────────────────────────
#  Shared Configuration
# ───────────────────────────────────────────────────────
shared:
  vault:
    address: ${VAULT_ADDR}
    token: ${VAULT_TOKEN}
    secret_prefix: enterprise-revops
  region: tor1
  environment:
    GOOGLE_FIRST_MANDATE: "true"
    N8N_ORCHESTRATION: "enabled"
