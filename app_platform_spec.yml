# DigitalOcean App Platform Spec — OpenClaw 3-Agent SDR Architecture
# Deploys 3 isolated agent workers on a single App Platform deployment
name: sdr-agent-openclaw

region: tor

workers:
  # ─────────────────────────────────────────────────────
  #  Agent 1: sdr-scraper — Lead Scraping & Enrichment
  # ─────────────────────────────────────────────────────
  - name: sdr-scraper
    instance_count: 1
    instance_size_slug: professional-xs
    image:
      registry_type: GHCR
      registry: stevecharles
      repository: sdr-agent-gradient
      tag: scraper-latest
    envs:
      - key: AGENT_ROLE
        value: scraper
      - key: AGENT_MODEL
        value: openai-gpt-5.4
      - key: VAULT_ADDR
        value: ${VAULT_ADDR}
        type: SECRET
      - key: VAULT_TOKEN
        value: ${VAULT_TOKEN}
        type: SECRET
      - key: DIGITALOCEAN_API_TOKEN
        value: ${DIGITALOCEAN_API_TOKEN}
        type: SECRET
    run_command: python3 -m openclaw_sdk run --agent sdr-scraper --spec openclaw_agent_spec.yml

  # ─────────────────────────────────────────────────────
  #  Agent 2: sdr-pitcher — Pitch Generation & Delivery
  # ─────────────────────────────────────────────────────
  - name: sdr-pitcher
    instance_count: 1
    instance_size_slug: professional-xs
    image:
      registry_type: GHCR
      registry: stevecharles
      repository: sdr-agent-gradient
      tag: pitcher-latest
    envs:
      - key: AGENT_ROLE
        value: pitcher
      - key: AGENT_MODEL
        value: openai-gpt-5.4
      - key: VAULT_ADDR
        value: ${VAULT_ADDR}
        type: SECRET
      - key: VAULT_TOKEN
        value: ${VAULT_TOKEN}
        type: SECRET
      - key: DIGITALOCEAN_API_TOKEN
        value: ${DIGITALOCEAN_API_TOKEN}
        type: SECRET
    run_command: python3 -m openclaw_sdk run --agent sdr-pitcher --spec openclaw_agent_spec.yml

  # ─────────────────────────────────────────────────────
  #  Agent 3: sdr-closer — Follow-Up & Closing
  # ─────────────────────────────────────────────────────
  - name: sdr-closer
    instance_count: 1
    instance_size_slug: professional-xs
    image:
      registry_type: GHCR
      registry: stevecharles
      repository: sdr-agent-gradient
      tag: closer-latest
    envs:
      - key: AGENT_ROLE
        value: closer
      - key: AGENT_MODEL
        value: openai-gpt-5.4
      - key: VAULT_ADDR
        value: ${VAULT_ADDR}
        type: SECRET
      - key: VAULT_TOKEN
        value: ${VAULT_TOKEN}
        type: SECRET
      - key: DIGITALOCEAN_API_TOKEN
        value: ${DIGITALOCEAN_API_TOKEN}
        type: SECRET
    run_command: python3 -m openclaw_sdk run --agent sdr-closer --spec openclaw_agent_spec.yml
