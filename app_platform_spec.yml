# DigitalOcean App Platform Spec — OpenClaw 3-Agent SDR Architecture
# Source: github.com/Oncova/sdr-agent-gradient
name: sdr-agent-openclaw

region: tor

workers:
  # Agent 1: sdr-scraper — Lead Scraping & Enrichment
  - name: sdr-scraper
    instance_count: 1
    instance_size_slug: professional-xs
    github:
      repo: Oncova/sdr-agent-gradient
      branch: main
      deploy_on_push: true
    build_command: pip install -r requirements.txt
    run_command: python3 -c "from orchestrator import initialize_all_mcps; initialize_all_mcps()"
    environment_slug: python
    envs:
      - key: AGENT_ROLE
        value: scraper
      - key: AGENT_MODEL
        value: openai-gpt-5.4

  # Agent 2: sdr-pitcher — Pitch Generation & Delivery
  - name: sdr-pitcher
    instance_count: 1
    instance_size_slug: professional-xs
    github:
      repo: Oncova/sdr-agent-gradient
      branch: main
      deploy_on_push: true
    build_command: pip install -r requirements.txt
    run_command: python3 -c "from main import generate_sdr_pitch; print('sdr-pitcher ready')"
    environment_slug: python
    envs:
      - key: AGENT_ROLE
        value: pitcher
      - key: AGENT_MODEL
        value: openai-gpt-5.4

  # Agent 3: sdr-closer — Follow-Up & Closing
  - name: sdr-closer
    instance_count: 1
    instance_size_slug: professional-xs
    github:
      repo: Oncova/sdr-agent-gradient
      branch: main
      deploy_on_push: true
    build_command: pip install -r requirements.txt
    run_command: python3 -c "from orchestrator import initialize_all_mcps; initialize_all_mcps()"
    environment_slug: python
    envs:
      - key: AGENT_ROLE
        value: closer
      - key: AGENT_MODEL
        value: openai-gpt-5.4
